<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Standard SEO Tags -->
    <title>Premium Custom Mechanical Keyboard | High-Performance Typing</title>
    <meta name="description" content="Experience precision and comfort with our custom mechanical keyboard. Featuring hot-swappable switches, CNC aluminum chassis, and PBT keycaps. Available now for $149.99.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Premium Custom Mechanical Keyboard">
    <meta property="og:description" content="Build your dream setup with our premium custom mechanical keyboard. Hot-swappable, durable, and designed for enthusiasts.">
    <meta property="og:image" content="https://example.com/assets/images/custom-keyboard-og.jpg">
    <meta property="og:url" content="https://example.com/products/custom-mechanical-keyboard">
    <meta property="og:type" content="product">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Premium Custom Mechanical Keyboard">
    <meta name="twitter:description" content="The ultimate custom typing experience. Fully customizable and built to last.">
    <meta name="twitter:image" content="https://example.com/assets/images/custom-keyboard-twitter.jpg">

    <!-- Structured Data (Schema.org JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Custom Mechanical Keyboard",
      "image": [
        "https://example.com/assets/images/keyboard-front.jpg"
      ],
      "description": "High-performance custom mechanical keyboard with hot-swappable switches and high-quality PBT keycaps.",
      "brand": {
        "@type": "Brand",
        "name": "KeyCraft"
      },
      "offers": {
        "@type": "Offer",
        "url": "https://example.com/products/custom-mechanical-keyboard",
        "priceCurrency": "USD",
        "price": "149.99",
        "itemCondition": "https://schema.org/NewCondition",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>   
</head>
<body>
    <section class="carousel-container">
        <div class="carousel-slides">
            <!-- Slide 1 -->
            <div class="slide active">
                <img src="https://picsum.photos/id/10/800/400" alt="Mountain Landscape">
            </div>
            <!-- Slide 2 -->
            <div class="slide">
                <img src="https://picsum.photos/id/20/800/400" alt="Office Workspace">
            </div>
            <!-- Slide 3 -->
            <div class="slide">
                <img src="https://picsum.photos/id/30/800/400" alt="Tech Setup">
            </div>
        </div>

        <!-- Carousel Nav Buttons -->
        <button class="carousel-btn prev-btn" id="prevBtn">&#10094;</button>
        <button class="carousel-btn next-btn" id="nextBtn">&#10095;</button>
    </section>
    <script src="app.js" defer></script>
</body>
</html>
